url: https://YOUR-ORG.github.io/pft/

template:
  bootstrap: 5
  bootswatch: cosmo

home:
  title: pft — ATS/ERS 2022-compliant pulmonary function test interpretation
  description: >
    A comprehensive R toolkit implementing the full Stanojevic 2022
    interpretive strategy: reference values, z-scores, ATS pattern
    classification, severity grading, bronchodilator response, PRISm
    screening, conditional change scores, and clinical visualisation.

reference:
  - title: Reference values
    desc: >
      GLI-derived predicted values, lower and upper limits of normal,
      and (when measured values are supplied) z-scores and percent
      predicted. Each function takes a data frame in and returns a
      tibble out.
    contents:
      - pft_spirometry
      - pft_volumes
      - pft_diffusion
      - pft_required_columns

  - title: Interpretation primitives
    desc: >
      Per-measure clinical interpretation primitives implementing the
      Stanojevic 2022 ERS/ATS standard.
    contents:
      - pft_classify
      - pft_volume_subpattern
      - pft_severity
      - pft_bdr
      - pft_prism
      - pft_change
      - pft_fev1q
      - pft_dlco_hb_correct

  - title: Predecessor 2005 standard
    desc: >
      Pellegrino 2005 interpretive primitives, provided for
      reclassification analyses comparing the current Stanojevic 2022
      standard against its predecessor. `pft_classify(standard = "2005")`
      and `pft_interpret(standard = "2005")` route through these.
    contents:
      - pft_severity_2005
      - pft_bdr_2005

  - title: Clinical extensions
    desc: >
      Maneuver-level quality grading (ATS/ERS 2019), COPD-specific
      severity (GOLD), and cohort-level summarisation.
    contents:
      - pft_quality
      - pft_gold
      - pft_cohort_summary

  - title: Workflow and reporting
    desc: >
      End-to-end interpretation in a single call, input QC,
      clinical-style visualisation, and HTML report rendering.
    contents:
      - pft_interpret
      - pft_validate
      - pft_plot
      - pft_report

  - title: Tidiers
    desc: >
      Long-form pivot and per-patient summary helpers for downstream
      dplyr / ggplot2 / tidymodels workflows. The `broom::tidy()` and
      `broom::glance()` generics dispatch to these when `broom` is
      installed.
    contents:
      - pft_long
      - pft_glance

  - title: Example data
    contents:
      - pft_example

  - title: Re-exports
    contents:
      - as_tibble

articles:
  - title: Reference
    navbar: ~
    contents:
      - pft
      - input-format
      - glossary

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]

news:
  releases:
  - text: "Development version"
    href: news/index.html
